version: 2
title: SemEval 2025 Task 11 - Track B
description: Multilingual emotion intensity prediction for SemEval 2025 Task 11.
image: images/bridge-logo.png
terms: pages/terms.md
registration_auto_approve: true
docker_image: codalab/codalab-legacy:py312
make_programs_available: true
make_input_data_available: false
enable_detailed_results: true
show_detailed_results_in_submission_panel: true
show_detailed_results_in_leaderboard: true
auto_run_submissions: true
forum_enabled: true

pages:
  - title: Overview
    file: pages/overview.md
  - title: Data
    file: pages/data.md
  - title: Submission
    file: pages/submission.md
  - title: Evaluation
    file: pages/evaluation.md
  - title: Terms
    file: pages/terms.md

phases:
  - index: 0
    name: Evaluation
    description: Track B result submission phase.
    start: 2026-05-18 00:00:00
    execution_time_limit: 600
    max_submissions: 999
    max_submissions_per_day: 999
    starting_kit: starting_kit
    public_data: resources/track_b_public_data.zip
    accepts_only_result_submissions: true
    tasks:
      - 0

tasks:
  - index: 0
    name: Track B
    description: Emotion intensity prediction.
    ingestion_program: resources/track_b_ingestion_program.zip
    reference_data: resources/track_b_reference_data.zip
    scoring_program: resources/track_b_scoring_program.zip

solutions:
  - index: 0
    path: resources/track_b_zero_submission.zip
    tasks:
      - 0

